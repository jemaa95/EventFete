
services:

  postgres:
    image: postgres:15
    container_name: eventfete_postgres
    environment:
      POSTGRES_DB: eventfete_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: eventfete_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: