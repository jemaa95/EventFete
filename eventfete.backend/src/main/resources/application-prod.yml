spring:
  jpa:
    show-sql: false
    hibernate:
      # ⚠️ "update" pour permettre à Hibernate de créer les tables au premier
      # déploiement (base Neon vide au départ). Une fois le schéma stable,
      # il serait plus sûr de passer à "validate" + un outil de migration
      # dédié (Flyway/Liquibase) pour les évolutions futures en production.
      ddl-auto: update

logging:
  level:
    com.eventfete: INFO