spring:
  application:
    name: EventFete

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ===== POSTGRESQL =====
  # En local : utilise les valeurs par défaut ci-dessous (Docker Compose).
  # En production : Render/Railway fournissent DATABASE_URL, DB_USERNAME,
  # DB_PASSWORD automatiquement via les variables d'environnement.
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/eventfete_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ===== REDIS =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  # ===== MAIL GMAIL SMTP =====
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:votre_email@gmail.com}
    password: ${MAIL_PASSWORD:votre_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== SERVEUR =====
server:
  # Render/Railway imposent leur propre port via la variable $PORT
  port: ${PORT:8080}

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:eventfete_super_secret_key_2026_very_long_key}
  expiration: ${JWT_EXPIRATION:900000}        # 15 minutes
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 jours

# ===== SWAGGER =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html