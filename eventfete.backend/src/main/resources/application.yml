spring:
  application:
    name: EventFete

  profiles:
    active: dev

  # ===== POSTGRESQL =====
  datasource:
    url: jdbc:postgresql://localhost:5433/eventfete_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ===== REDIS =====
  data:
    redis:
      host: localhost
      port: 6379

  # ===== MAIL GMAIL SMTP =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: votre_email@gmail.com
    password: votre_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== SERVEUR =====
server:
  port: 8080

# ===== JWT =====
jwt:
  secret: eventfete_super_secret_key_2026_very_long_key
  expiration: 900000        # 15 minutes
  refresh-expiration: 604800000  # 7 jours

# ===== SWAGGER =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html